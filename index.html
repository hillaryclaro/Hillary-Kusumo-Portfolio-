<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hillary Kusumo Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

#particles-js {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.content { padding:40px; }

.container {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:30px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  cursor:pointer;
}

.card img {
  width:100%;
  border-radius:8px;
  margin-bottom:10px;
}

.collapse-content {
  display:none;
  margin-top:10px;
}

.video-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

video {
  width:100%;
  border-radius:8px;
}

.btn {
  display:block;
  margin-top:10px;
  padding:10px;
  background:#3b82f6;
  color:white;
  text-align:center;
  border-radius:6px;
  text-decoration:none;
}

/* slider */
.slider-container {
  position:relative;
  margin-top:15px;
}

.slider-overlay {
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.slider-bar {
  position:absolute;
  top:0;
  bottom:0;
  width:4px;
  background:#3b82f6;
  left:50%;
  cursor:pointer;
}
</style>
</head>

<body>
<div id="particles-js"></div>

<div class="content">

<div class="container">

<!-- Resume -->
<div class="card">
  <img src="Resume Thumbnail.png">
  <h2>Resume</h2>
  <a class="btn" href="https://drive.google.com/file/d/1gRUr3Y4En71HGnATofre68AUSJkKgrbN/view" target="_blank">View Resume</a>
</div>

<!-- Certificate -->
<div class="card">
  <img src="Certificate Thumbnail.png">
  <h2>Micro 1 Certificate</h2>
  <a class="btn" href="https://drive.google.com/file/d/1jIfqd8ttvwceigDHtd4HyttNUr652OtC/view" target="_blank">View Certificate</a>
</div>

<!-- Annotation -->
<div class="card" id="annotationCard">
  <img src="Images/0.png">
  <h2>Annotation Project</h2>

  <div class="collapse-content" id="annotationContent">
    <video controls>
      <source src="cvat_project.mp4">
    </video>
  </div>
</div>

<!-- Evaluation -->
<div class="card" id="evaluationCard">
  <img src="Thumbnail.png">
  <h2>Video & Image Evaluation</h2>

  <div class="collapse-content" id="evaluationContent">

    <button class="btn" onclick="playSync(event)">Play Both Videos</button>

    <div class="video-grid">
      <video id="vid1" controls>
        <source src="video 1.mp4">
      </video>

      <video id="vid2" controls>
        <source src="video 2.mp4">
      </video>
    </div>

    <h3>Slider Comparison</h3>

    <div class="slider-container" id="slider">

      <video src="video 1.mp4" autoplay muted loop></video>

      <div class="slider-overlay" id="overlay">
        <video src="video 2.mp4" autoplay muted loop></video>
      </div>

      <div class="slider-bar" id="sliderBar"></div>

    </div>

  </div>
</div>

</div>
</div>

<script>
particlesJS("particles-js",{particles:{number:{value:80},size:{value:3},move:{speed:1},line_linked:{enable:true}}})

/* Annotation toggle */
const annotationCard=document.getElementById("annotationCard")
const annotationContent=document.getElementById("annotationContent")

annotationCard.addEventListener("click",()=>{
  annotationContent.style.display =
  annotationContent.style.display==="block"?"none":"block"
})

annotationContent.addEventListener("click",e=>e.stopPropagation())

/* Evaluation toggle */
const evaluationCard=document.getElementById("evaluationCard")
const evaluationContent=document.getElementById("evaluationContent")

evaluationCard.addEventListener("click",()=>{
  evaluationContent.style.display =
  evaluationContent.style.display==="block"?"none":"block"
})

evaluationContent.addEventListener("click",e=>e.stopPropagation())

/* Sync play */
function playSync(e){
  e.stopPropagation()
  const v1=document.getElementById("vid1")
  const v2=document.getElementById("vid2")

  v1.currentTime=0
  v2.currentTime=0

  v1.play()
  v2.play()
}

/* slider */
const slider=document.getElementById("slider")
const overlay=document.getElementById("overlay")
const bar=document.getElementById("sliderBar")

let dragging=false

bar.addEventListener("mousedown",()=>dragging=true)
window.addEventListener("mouseup",()=>dragging=false)

window.addEventListener("mousemove",(e)=>{
  if(!dragging) return

  const rect=slider.getBoundingClientRect()
  let x=e.clientX-rect.left

  if(x<0) x=0
  if(x>rect.width) x=rect.width

  overlay.style.width=x+"px"
  bar.style.left=x+"px"
})
</script>

</body>
</html>
