<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hillary Kusumo Portfolio</title>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  background:black;
}

/* VIDEO BACKGROUND */
#bg-video {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:contain; /* FIXED ZOOM */
  z-index:-2;
  background:black;
}

/* DARK OVERLAY */
body::after {
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(2,6,23,0.6);
  z-index:-1;
}

.content { padding:30px; }

.container {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:20px;
  max-width:900px;
  margin:auto;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
  transition:0.2s;
}

.card:hover { transform:scale(1.03); }

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

/* overlay */
.overlay {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#020617;
  z-index:9999;
  padding:30px;
  overflow:auto;
}

.close-btn {
  background:#ef4444;
  padding:10px;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
  margin-bottom:20px;
}

/* sections */
.section-box {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  max-width:900px;
}

.section-box h3 {
  margin-top:0;
  color:#60a5fa;
}

/* videos & images */
.video-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  max-width:600px;
}

.video-grid video, .video-grid img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:8px;
}

/* annotation layout */
.annotation-flex {
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.annotation-flex .notes, .annotation-flex .images {
  flex:1;
  min-width:250px;
  max-height:500px;
  overflow:auto;
}

/* highlight */
.highlight {
  background:#3b82f6;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

/* slider */
.slider-container {
  position:relative;
  margin-top:20px;
  max-width:600px;
}

.slider-container video {
  height:200px;
  object-fit:cover;
}

.slider-overlay {
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.slider-bar {
  position:absolute;
  top:0;
  bottom:0;
  width:4px;
  background:#3b82f6;
  left:50%;
  cursor:pointer;
}

/* button */
.btn {
  margin:10px 0;
  padding:10px;
  background:#3b82f6;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:6px;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
  <source src="Linkedin.mp4" type="video/mp4">
</video>

<div class="content">
<div class="container">

<div class="card">
<img src="Resume Thumbnail.png">
<h3>Resume</h3>
<a href="https://drive.google.com/file/d/1gRUr3Y4En71HGnATofre68AUSJkKgrbN/view" target="_blank">Open</a>
</div>

<div class="card">
<img src="Certificate Thumbnail.png">
<h3>Certificate</h3>
<a href="https://drive.google.com/file/d/1jIfqd8ttvwceigDHtd4HyttNUr652OtC/view" target="_blank">Open</a>
</div>

<div class="card" onclick="openOverlay('annotationOverlay')">
<img src="Images/0.png">
<h3>Annotation Project</h3>
</div>

<div class="card" onclick="openOverlay('evaluationOverlay')">
<img src="Thumbnail.png">
<h3>Video & Image Evaluation</h3>
</div>

</div>
</div>

<div class="overlay" id="annotationOverlay">
<button class="close-btn" onclick="closeOverlay('annotationOverlay')">Close</button>

<div class="section-box">
<h2>Annotation Project</h2>
<p>Structured labeling using bounding boxes and keypoints.</p>
</div>

</div>

<div class="overlay" id="evaluationOverlay">
<button class="close-btn" onclick="closeOverlay('evaluationOverlay')">Close</button>

<div class="section-box">
<h2>Evaluation Project</h2>

<button class="btn" onclick="playSync()">Play Videos</button>

<div class="video-grid">
<video id="vid1" controls>
<source src="video 1.mp4">
</video>

<video id="vid2" controls>
<source src="video 2.mp4">
</video>
</div>

<div class="highlight">
Final Decision: Video 1 selected
</div>

</div>

</div>

<script>
function openOverlay(id){
  document.getElementById(id).style.display="block"
}

function closeOverlay(id){
  document.getElementById(id).style.display="none"
}

function playSync(){
  const v1=document.getElementById("vid1")
  const v2=document.getElementById("vid2")

  v1.currentTime=0
  v2.currentTime=0

  v1.play()
  v2.play()
}
</script>

</body>
</html>
