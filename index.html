<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hillary Kusumo Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
#particles-js { position:fixed; width:100%; height:100%; z-index:-1; }

.content { padding:40px; }
.container { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:30px; }

.card { background:#1e293b; padding:20px; border-radius:12px; cursor:pointer; }
.card img { width:100%; border-radius:8px; }

.collapse-content { display:none; margin-top:15px; }

.video-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; }

video { width:100%; border-radius:8px; }

.sync-btn {
  margin:10px 0;
  padding:10px;
  background:#3b82f6;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
  width:100%;
}

/* Slider */
.slider-container {
  position: relative;
  width: 100%;
  margin-top: 20px;
}

.slider-video {
  position: absolute;
  width: 100%;
  height: auto;
  top: 0;
  left: 0;
}

.slider-video video {
  width: 100%;
}

.slider-overlay {
  position: absolute;
  width: 50%;
  overflow: hidden;
  top: 0;
  left: 0;
}

.slider-bar {
  position: absolute;
  width: 4px;
  background: #3b82f6;
  top: 0;
  bottom: 0;
  left: 50%;
  cursor: ew-resize;
}
</style>
</head>

<body>
<div id="particles-js"></div>

<div class="content">
<div class="container">

<!-- Evaluation Card -->
<div class="card" id="evaluationCard">
<img src="Thumbnail.png">
<h2>Video & Image Evaluation</h2>

<div class="collapse-content" id="evaluationContent">

<button class="sync-btn" onclick="playSync()">Play Both Videos</button>

<div class="video-grid">
  <video id="vid1" controls>
    <source src="video 1.mp4">
  </video>

  <video id="vid2" controls>
    <source src="video 2.mp4">
  </video>
</div>

<h3>Slider Comparison</h3>

<div class="slider-container" id="slider">

  <div class="slider-video">
    <video id="baseVideo" muted loop>
      <source src="video 1.mp4">
    </video>
  </div>

  <div class="slider-overlay" id="overlay">
    <video id="topVideo" muted loop>
      <source src="video 2.mp4">
    </video>
  </div>

  <div class="slider-bar" id="sliderBar"></div>

</div>

</div>
</div>

</div>
</div>

<script>
particlesJS("particles-js",{particles:{number:{value:80},size:{value:3},move:{speed:1},line_linked:{enable:true}}})

const evaluationCard = document.getElementById("evaluationCard")
const evaluationContent = document.getElementById("evaluationContent")

evaluationCard.onclick = () => {
  evaluationContent.style.display = evaluationContent.style.display === "block" ? "none" : "block"
}

/* Sync Play */
function playSync(){
  const v1 = document.getElementById("vid1")
  const v2 = document.getElementById("vid2")
  v1.currentTime = 0
  v2.currentTime = 0
  v1.play()
  v2.play()
}

/* Slider Logic */
const slider = document.getElementById("slider")
const overlay = document.getElementById("overlay")
const bar = document.getElementById("sliderBar")

let dragging = false

bar.addEventListener("mousedown", () => dragging = true)
window.addEventListener("mouseup", () => dragging = false)

window.addEventListener("mousemove", (e) => {
  if (!dragging) return
  const rect = slider.getBoundingClientRect()
  let x = e.clientX - rect.left
  if (x < 0) x = 0
  if (x > rect.width) x = rect.width

  overlay.style.width = x + "px"
  bar.style.left = x + "px"
})

/* autoplay slider videos */
document.getElementById("baseVideo").play()
document.getElementById("topVideo").play()
</script>

</body>
</html>
