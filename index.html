<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hillary Kusumo Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 40px;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    h2 {
      margin-bottom: 15px;
    }

    p {
      font-size: 14px;
      color: #cbd5f5;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    .btn:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

  <h1>My Portfolio</h1>

  <div class="container">

    <!-- Resume Card -->
    <div class="card">
      <h2>Resume</h2>
      <p>View my professional experience, skills, and background.</p>
      <a class="btn" href="https://drive.google.com/file/d/1gRUr3Y4En71HGnATofre68AUSJkKgrbN/view?usp=sharing" target="_blank">
        View Resume
      </a>
    </div>

    <!-- Certificate Card -->
    <div class="card">
      <h2>Micro 1 Certificate</h2>
      <p>Proof of my training and certification in annotation and evaluation.</p>
      <a class="btn" href="https://drive.google.com/file/d/1jIfqd8ttvwceigDHtd4HyttNUr652OtC/view?usp=sharing" target="_blank">
        View Certificate
      </a>
    </div>

  </div>

</body>
</html>
