<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hillary Kusumo Portfolio</title>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Animated Background Library -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      overflow-x: hidden;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: #0f172a;
    }

    .content {
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #3b82f6;
      margin-bottom: 15px;
    }

    .name {
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .info a {
      color: #3b82f6;
      text-decoration: none;
      margin: 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .info a:hover {
      color: #60a5fa;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .card {
      background: rgba(30, 41, 59, 0.8);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      transition: 0.3s;
      backdrop-filter: blur(6px);
    }

    .card:hover {
      transform: translateY(-8px) scale(1.03);
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #cbd5f5;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    .btn:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

  <!-- Animated Background -->
  <div id="particles-js"></div>

  <div class="content">

    <!-- HEADER -->
    <div class="header">

      <img src="https://via.placeholder.com/150" class="profile-pic">

      <div class="name">HILLARY CLARENCE KUSUMO</div>

      <div class="info">
        <a href="https://www.linkedin.com/in/hillary-kusumo-b66913178/?skipRedirect=true" target="_blank">
          <i class="fab fa-linkedin"></i> LinkedIn
        </a>

        <a href="mailto:clarohillary@gmail.com">
          <i class="fas fa-envelope"></i> clarohillary@gmail.com
        </a>

        <a href="mailto:Hillaryclaro@gmail.com">
          <i class="fas fa-envelope"></i> Hillaryclaro@gmail.com
        </a>
      </div>

    </div>

    <!-- CARDS -->
    <div class="container">

      <div class="card">
        <h2>Resume</h2>
        <p>View my professional experience and skills.</p>
        <a class="btn" href="https://drive.google.com/file/d/1gRUr3Y4En71HGnATofre68AUSJkKgrbN/view?usp=sharing" target="_blank">
          View Resume
        </a>
      </div>

      <div class="card">
        <h2>Micro 1 Certificate</h2>
        <p>Proof of my annotation and evaluation training.</p>
        <a class="btn" href="https://drive.google.com/file/d/1jIfqd8ttvwceigDHtd4HyttNUr652OtC/view?usp=sharing" target="_blank">
          View Certificate
        </a>
      </div>

    </div>

  </div>

  <!-- Particles Config -->
  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 80 },
        size: { value: 3 },
        move: { speed: 1 },
        line_linked: { enable: true },
      }
    });
  </script>

</body>
</html>
